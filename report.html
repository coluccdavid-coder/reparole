<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReParole — Bilan de suivi</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ortho.css">
</head>
<body>
<!--
  v6.29 — BILAN PDF PROFESSIONNEL. Reste réservé à l'orthophoniste et en
  français uniquement (contrairement à patient-report.html, v6.27,
  volontairement multilingue et simplifié). Ce qui change ici par
  rapport à l'ancien "Rapport de suivi" :
   - Se lit d'abord comme un bilan (bandeau ReParole discret en haut,
     pas un gros logo d'appli) — pensé pour être imprimé/joint à un
     dossier patient, pas juste consulté à l'écran.
   - Bloc identité à deux colonnes (patient / praticien), plutôt qu'une
     seule ligne de sous-titre.
   - Le profil clinique déclaré par l'orthophoniste (Type Broca...),
     jusqu'ici visible seulement dans le tableau de bord ortho, apparaît
     maintenant sur le document lui-même s'il a été renseigné.
   - Ligne de signature en bas — un bilan qu'on imprime pour l'archiver
     doit pouvoir être signé/tamponné.
   - CSS d'impression : marges @page correctes, sections qui ne se
     coupent plus au milieu d'une page.
  Pas encore fait (nécessiterait un champ supplémentaire côté profil
  ortho, hors de portée de cette demande) : logo/en-tête personnalisé du
  cabinet. Voir SKILL_ReParole_v6.md, "prochaines pistes".
-->
<div class="report-page" id="report">
  <p class="hint">Chargement du bilan…</p>
</div>
<div class="wrap no-print" style="text-align:center">
  <button class="btn-primary report-print-btn" onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
</div>

<script src="js/storage.js"></script>
<script src="js/learner.js"></script>
<script src="js/charts.js"></script>
<script>
const Store = window.ReParoleStore;
const AI = window.Learner;
const LEVEL_NAMES = {1:'Doux',2:'Intermédiaire',3:'Avancé'};

function qs(name){ return new URLSearchParams(location.search).get(name); }

async function buildReport(){
  const code = qs('code');
  const orthoCode = qs('ortho');
  const orthoName = qs('orthoName'); // v6.29 : facultatif — absent si lien généré par une ancienne version
  const el = document.getElementById('report');
  if(!code){ el.innerHTML = '<p>Code patient manquant dans l\'adresse (ex: report.html?code=demo).</p>'; return; }

  const patient = await Store.loadPatient(code);
  if(!patient){ el.innerHTML = '<p>Dossier introuvable pour ce code.</p>'; return; }

  const profile = await Store.loadProfile(code);
  AI.load(profile);
  const dominant = AI.dominantDifficulty();
  const top = AI.topErrors().filter(e=>e.count>0);
  const catLabels = window.ERROR_LABELS || {};

  const hist = await Store.history(code);
  const period = hist.length ? {
    start: new Date(hist[0].at),
    end: new Date(hist[hist.length-1].at)
  } : null;
  const trend = AI.trend(hist);

  const successPct = patient.total ? Math.round(100*patient.correct/patient.total) : null;

  const clinicalKey = patient.clinical_profile;
  const clinicalLabel = (clinicalKey && clinicalKey!=='none' && window.CLINICAL_PROFILES && window.CLINICAL_PROFILES[clinicalKey])
    ? window.CLINICAL_PROFILES[clinicalKey].label : null;

  el.innerHTML = `
    <div class="report-letterhead">
      <span>ReParole — suivi de rééducation</span>
      <span>Généré le ${new Date().toLocaleDateString('fr-FR')}</span>
    </div>
    <div class="report-header">
      <h1>Bilan de suivi orthophonique</h1>
      ${period ? `<div class="r-sub">Période couverte : du ${period.start.toLocaleDateString('fr-FR')} au ${period.end.toLocaleDateString('fr-FR')}</div>` : ''}
    </div>

    <div class="report-identity">
      <div class="id-block"><b>Patient</b>${patient.name}<br><span style="color:var(--ink-soft);font-size:.8rem">Code de suivi : ${code}</span></div>
      <div class="id-block"><b>Réalisé par</b>${orthoName ? orthoName : '<span style="color:var(--ink-soft)">Non renseigné</span>'}</div>
    </div>

    ${clinicalLabel ? `<div class="report-clinical-box">Profil clinique déclaré : ${clinicalLabel}</div>` : ''}

    <div class="report-section">
      <h2>Résumé de l'activité</h2>
      <div class="report-grid">
        <div><div class="num">${patient.sessions}</div><div class="lab">séances</div></div>
        <div><div class="num">${successPct!==null ? successPct+'%':'—'}</div><div class="lab">taux de réussite global</div></div>
        <div><div class="num">${LEVEL_NAMES[patient.level]||LEVEL_NAMES[2]}</div><div class="lab">niveau actuel</div></div>
      </div>
      ${window.Charts ? `<div style="margin-top:16px">${Charts.successLine(hist)}</div>` : ''}
      <p style="color:var(--ink-soft);font-size:.85rem;margin-top:8px">${
        trend.direction==='hausse' ? `📈 Tendance à la hausse sur les dernières séances (+${trend.deltaPct} points).`
        : trend.direction==='baisse' ? `📉 Tendance à la baisse sur les dernières séances (${trend.deltaPct} points).`
        : trend.direction==='stable' ? `➡️ Tendance stable sur les dernières séances.`
        : `Pas encore assez de séances pour dégager une tendance.`
      }</p>
    </div>

    <div class="report-section">
      <h2>Analyse des erreurs</h2>
      <p class="disclaimer">⚠️ Catégorisation automatique fournie à titre de piste de lecture. Elle ne constitue pas un diagnostic et ne remplace pas le bilan orthophonique.</p>
      ${dominant ? `<p><b>Difficulté dominante observée :</b> ${dominant.label} (${dominant.count} occurrence(s)).</p>` : '<p>Pas encore assez de données pour dégager une tendance.</p>'}
      ${top.length ? `<ul>${top.map(e=>`<li>${catLabels[e.category]||e.category} : ${e.count}</li>`).join('')}</ul>` : ''}
    </div>

    <div class="report-section">
      <h2>Historique récent des séances</h2>
      ${hist.length ? `
        <table style="width:100%;border-collapse:collapse;font-size:.85rem">
          <thead><tr style="text-align:left;border-bottom:2px solid var(--line)"><th>Date</th><th>Exercice</th><th>Score</th><th>Niveau</th></tr></thead>
          <tbody>
            ${hist.slice(-20).reverse().map(s=>`<tr style="border-bottom:1px solid var(--line);page-break-inside:avoid">
              <td>${new Date(s.at).toLocaleDateString('fr-FR')}</td><td>${s.type}</td><td>${s.score}/${s.total}</td><td>${LEVEL_NAMES[s.level]||LEVEL_NAMES[2]}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<p>Aucune séance enregistrée.</p>'}
    </div>

    <p class="report-note">
      Ce bilan est généré automatiquement par ReParole à partir de l'usage de l'application par le patient.
      Il s'agit d'un outil d'appui, pas d'un compte-rendu clinique à lui seul : l'interprétation et la décision
      thérapeutique restent la responsabilité exclusive de l'orthophoniste. Conformément au RGPD, ce document
      contient des données de santé — à conserver et transmettre selon vos procédures habituelles de
      confidentialité.
    </p>

    <div class="report-signature">
      <div><div class="sig-line">Date</div></div>
      <div><div class="sig-line">Signature et cachet du professionnel</div></div>
    </div>
  `;

  // Journalise la génération du rapport (métadonnées seulement)
  await Store.saveReportMeta(code, orthoCode, {
    sessions: patient.sessions, successPct, dominant: dominant?dominant.category:null, topErrors: top
  }, period?period.start.toISOString():null, period?period.end.toISOString():null);
}
buildReport();
</script>
</body>
</html>
