<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReParole — Mon résumé</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ortho.css">
</head>
<body>
<!--
  v6.27 — Résumé imprimable côté PATIENT, à apporter au premier vrai
  rendez-vous (piste identifiée dans SKILL_ReParole_v6.md, "Prochaines
  pistes"). Volontairement différent de report.html (réservé à
  l'orthophoniste) :
   - multilingue (charge prefs.js + i18n.js, comme index.html), report.html
     reste français uniquement (toujours à usage professionnel) ;
   - PAS d'analyse d'erreurs par catégorie (sémantique/phonologique/...) :
     cette lecture demande une interprétation professionnelle et n'a pas sa
     place dans un document que le patient s'approprie seul ;
   - insiste sur "à apporter à votre rendez-vous", jamais sur un diagnostic.
  Réutilise les classes CSS existantes de css/ortho.css (report-page,
  report-header, report-section, report-grid, report-note, no-print) —
  aucun nouveau CSS nécessaire.
-->
<div class="wrap no-print" style="text-align:center;padding-top:16px">
  <div class="lang-switch" data-lang-switcher style="display:inline-flex;gap:8px"></div>
</div>
<div class="report-page" id="report">
  <p class="hint">Chargement de votre résumé…</p>
</div>
<div class="wrap no-print" style="text-align:center">
  <button class="btn-primary report-print-btn" id="print-btn" onclick="window.print()">🖨️ Imprimer / Enregistrer en PDF</button>
</div>

<script src="js/prefs.js"></script>
<script src="js/i18n.js"></script>
<script src="js/storage.js"></script>
<script src="js/learner.js"></script>
<script src="js/charts.js"></script>
<script>
const Store = window.ReParoleStore;
const AI = window.Learner;

function qs(name){ return new URLSearchParams(location.search).get(name); }

function levelName(level){
  return I18N.t('level_'+([1,2,3].includes(level)?level:2));
}

async function buildReport(){
  const code = qs('code');
  const el = document.getElementById('report');
  if(!code){ el.innerHTML = `<p>${I18N.t('missing_code_report')}</p>`; return; }

  const patient = await Store.loadPatient(code);
  if(!patient){ el.innerHTML = `<p>${I18N.t('patient_not_found_report')}</p>`; return; }

  const profile = await Store.loadProfile(code);
  AI.load(profile);

  const hist = await Store.history(code);
  const period = hist.length ? {
    start: new Date(hist[0].at),
    end: new Date(hist[hist.length-1].at)
  } : null;
  const trend = AI.trend(hist);

  const successPct = patient.total ? Math.round(100*patient.correct/patient.total) : null;
  const locale = I18N.speechLocale() || 'fr-FR';

  const trendMsg = trend.direction==='hausse' ? I18N.t('trend_up', trend.deltaPct)
    : trend.direction==='baisse' ? I18N.t('trend_down', trend.deltaPct)
    : trend.direction==='stable' ? I18N.t('trend_stable')
    : I18N.t('ortho_no_trend_data');

  el.innerHTML = `
    <div class="report-header">
      <h1>${I18N.t('patient_report_title')}</h1>
      <div class="r-sub">${patient.name} (${code}) — ${I18N.t('report_generated', new Date().toLocaleDateString(locale))}</div>
      ${period ? `<div class="r-sub">${I18N.t('report_period', period.start.toLocaleDateString(locale), period.end.toLocaleDateString(locale))}</div>` : ''}
    </div>

    <div class="report-section">
      <h2>${I18N.t('patient_report_activity_title')}</h2>
      <div class="report-grid">
        <div><div class="num">${patient.sessions}</div><div class="lab">${I18N.t('stat_sessions')}</div></div>
        <div><div class="num">${successPct!==null ? successPct+'%':'—'}</div><div class="lab">${I18N.t('stat_success')}</div></div>
        <div><div class="num">${levelName(patient.level)}</div><div class="lab">${I18N.t('patient_report_level_label')}</div></div>
      </div>
      ${window.Charts && hist.length ? `<div style="margin-top:16px">${Charts.successLine(hist)}</div>` : ''}
      <p style="color:var(--ink-soft);font-size:.85rem;margin-top:8px">${
        hist.length ? trendMsg : I18N.t('patient_report_no_sessions')
      }</p>
    </div>

    <p class="report-note">${I18N.t('patient_report_note')}</p>
  `;
}

// Regénère si la langue change depuis le sélecteur de cette page —
// même mécanisme que index.html (onLangChange), sinon on retombe dans
// exactement le bug de la v6.25 (contenu figé dans l'ancienne langue).
window.onLangChange = function(){
  const printBtn = document.getElementById('print-btn');
  if(printBtn) printBtn.textContent = I18N.t('btn_print_now');
  buildReport();
};

Prefs.load(); // déclenche déjà buildReport() une première fois via onLangChange() ci-dessus
</script>
</body>
</html>
